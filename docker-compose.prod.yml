# JT Dashboard — Production Stack (Docker Swarm + Portainer)
#
# Reverse proxy: Traefik v2.11.3 já existente (stack `traefik`)
# Network compartilhada: network_swarm_public (overlay, external)
# Cert resolver: letsencryptresolver (Let's Encrypt HTTP challenge)
#
# Variáveis obrigatórias (configurar em Portainer → Environment variables):
#   GITHUB_REPOSITORY        ex: felipenunesfraga/jt-dashboard
#   IMAGE_TAG                default: latest
#   POSTGRES_PASSWORD        senha forte 20+ chars
#   AUTH_SECRET              32+ chars (gerar com: openssl rand -base64 48)
#   ADMIN_EMAIL
#   ADMIN_PASSWORD_HASH      bcrypt — escapar $ como $$ no compose
#   META_SYSTEM_USER_TOKEN
#   META_ACCOUNTS            JSON em uma linha
#
# Opcionais:
#   META_API_VERSION         default: v22.0
#   META_TEST_EVENT_CODE     vazio em prod
#   META_CAPI_DRY_RUN        default: false
#   ZAPI_INSTANCES, WHATSAPP_WEBHOOK_SECRET
#   GHL_PRIVATE_TOKEN, GHL_LOCATION_ID, GHL_WEBHOOK_SECRET
#   BACKUP_RETENTION_DAYS    default: 14
#
# Auto-deploy:
#   Shepherd monitora ghcr.io a cada 5min e atualiza services com label
#   `shepherd.enable=true`. Push pra main → GitHub Actions builda → Shepherd deploya.
#
# Migrations (rodar 1x após primeiro deploy):
#   docker exec -it $(docker ps -q -f name=jt_worker) \
#     node --import tsx packages/db/src/migrate.ts

version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: jt_dashboard
      POSTGRES_USER: jt
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - jt_postgres_data:/var/lib/postgresql/data
      - jt_backups:/backups
    networks:
      - jt_internal
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U jt -d jt_dashboard']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 10s
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          memory: 1G

  redis:
    image: redis:7-alpine
    command:
      [
        'redis-server',
        '--maxmemory',
        '256mb',
        '--maxmemory-policy',
        'allkeys-lru',
        '--appendonly',
        'yes',
      ]
    volumes:
      - jt_redis_data:/data
    networks:
      - jt_internal
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 10s
      resources:
        limits:
          memory: 384M

  worker:
    image: ghcr.io/${GITHUB_REPOSITORY}-worker:${IMAGE_TAG:-latest}
    environment:
      NODE_ENV: production
      LOG_LEVEL: info
      DATABASE_URL: postgres://jt:${POSTGRES_PASSWORD}@postgres:5432/jt_dashboard
      REDIS_URL: redis://redis:6379
      WORKER_PORT: 4000
      WORKER_PUBLIC_URL: https://webhooks.junqueiraeteixeira.adv.br
      META_SYSTEM_USER_TOKEN: ${META_SYSTEM_USER_TOKEN}
      META_ACCOUNTS: ${META_ACCOUNTS}
      META_API_VERSION: ${META_API_VERSION:-v22.0}
      META_TEST_EVENT_CODE: ${META_TEST_EVENT_CODE:-}
      META_CAPI_DRY_RUN: ${META_CAPI_DRY_RUN:-false}
      ZAPI_INSTANCES: ${ZAPI_INSTANCES:-}
      WHATSAPP_WEBHOOK_SECRET: ${WHATSAPP_WEBHOOK_SECRET:-}
      GHL_PRIVATE_TOKEN: ${GHL_PRIVATE_TOKEN:-}
      GHL_LOCATION_ID: ${GHL_LOCATION_ID:-}
      GHL_WEBHOOK_SECRET: ${GHL_WEBHOOK_SECRET:-}
    networks:
      - jt_internal
      - network_swarm_public
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 10s
      update_config:
        order: start-first
        failure_action: rollback
        delay: 10s
      resources:
        limits:
          memory: 768M
      labels:
        - 'shepherd.enable=true'
        - 'traefik.enable=true'
        - 'traefik.swarm.network=network_swarm_public'
        - 'traefik.http.routers.jt-worker.rule=Host(`webhooks.junqueiraeteixeira.adv.br`)'
        - 'traefik.http.routers.jt-worker.entrypoints=websecure'
        - 'traefik.http.routers.jt-worker.tls=true'
        - 'traefik.http.routers.jt-worker.tls.certresolver=letsencryptresolver'
        - 'traefik.http.services.jt-worker.loadbalancer.server.port=4000'

  web:
    image: ghcr.io/${GITHUB_REPOSITORY}-web:${IMAGE_TAG:-latest}
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://jt:${POSTGRES_PASSWORD}@postgres:5432/jt_dashboard
      AUTH_SECRET: ${AUTH_SECRET}
      NEXTAUTH_URL: https://dashboard.junqueiraeteixeira.adv.br
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH}
    networks:
      - jt_internal
      - network_swarm_public
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 10s
      update_config:
        order: start-first
        failure_action: rollback
        delay: 10s
      resources:
        limits:
          memory: 768M
      labels:
        - 'shepherd.enable=true'
        - 'traefik.enable=true'
        - 'traefik.swarm.network=network_swarm_public'
        - 'traefik.http.routers.jt-web.rule=Host(`dashboard.junqueiraeteixeira.adv.br`)'
        - 'traefik.http.routers.jt-web.entrypoints=websecure'
        - 'traefik.http.routers.jt-web.tls=true'
        - 'traefik.http.routers.jt-web.tls.certresolver=letsencryptresolver'
        - 'traefik.http.services.jt-web.loadbalancer.server.port=3000'

  # Shepherd — Watchtower equivalente pra Swarm. Atualiza services com
  # label `shepherd.enable=true` quando há nova imagem em ghcr.io
  shepherd:
    image: containrrr/shepherd:latest
    environment:
      TZ: America/Sao_Paulo
      SLEEP_TIME: '300'
      FILTER_SERVICES: 'label=shepherd.enable=true'
      ROLLBACK_ON_FAILURE: 'true'
      WITH_REGISTRY_AUTH: 'true'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - jt_internal
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: any
        delay: 30s
      resources:
        limits:
          memory: 64M

  # Backup diário do Postgres às 03:00 BRT (06:00 UTC)
  backup:
    image: postgres:16-alpine
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
    volumes:
      - jt_backups:/backups
    networks:
      - jt_internal
    entrypoint: ['/bin/sh', '-c']
    command:
      - |
        echo "Backup loop iniciado — diário às 03:00 BRT (06:00 UTC)"
        while true; do
          NOW=$$(date -u +%s)
          NEXT=$$(date -u -d "today 06:00" +%s 2>/dev/null || echo $$(($$NOW + 86400)))
          if [ "$$NEXT" -le "$$NOW" ]; then NEXT=$$((NEXT + 86400)); fi
          SLEEP=$$((NEXT - NOW))
          echo "Próximo backup em $$SLEEP segundos"
          sleep $$SLEEP
          STAMP=$$(date -u +%Y%m%d-%H%M%S)
          OUT="/backups/jt_dashboard_$$STAMP.sql.gz"
          echo "Iniciando backup → $$OUT"
          pg_dump -h postgres -U jt -d jt_dashboard | gzip > "$$OUT" \
            && echo "Backup OK ($$OUT)" \
            || echo "Backup FALHOU"
          find /backups -name "jt_dashboard_*.sql.gz" -mtime +$${BACKUP_RETENTION_DAYS} -delete
        done
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: any
        delay: 60s
      resources:
        limits:
          memory: 128M

volumes:
  jt_postgres_data:
  jt_redis_data:
  jt_backups:

networks:
  jt_internal:
    driver: overlay
    attachable: true
  network_swarm_public:
    external: true
